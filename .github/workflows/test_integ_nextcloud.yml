name: Integ (nextcloud)

permissions:
  contents: read

"on":
  push:
    branches: [main]
    paths:
      - integ/nextcloud.py
      - integ/truth_nextcloud.txt
      - integ/check_lines.sh
      - python/mirage/accessor/nextcloud.py
      - python/mirage/core/nextcloud/**
      - python/mirage/commands/builtin/nextcloud/**
      - python/mirage/resource/nextcloud/**
      - .github/workflows/test_integ_nextcloud.yml
  pull_request:
    branches: [main]
    paths:
      - integ/nextcloud.py
      - integ/truth_nextcloud.txt
      - integ/check_lines.sh
      - python/mirage/accessor/nextcloud.py
      - python/mirage/core/nextcloud/**
      - python/mirage/commands/builtin/nextcloud/**
      - python/mirage/resource/nextcloud/**
      - .github/workflows/test_integ_nextcloud.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integ-nextcloud:
    runs-on: ubuntu-latest
    services:
      nextcloud:
        image: nextcloud:30-apache
        ports:
          - 8080:80
        env:
          SQLITE_DATABASE: nextcloud
          NEXTCLOUD_ADMIN_USER: admin
          NEXTCLOUD_ADMIN_PASSWORD: admin123
          NEXTCLOUD_TRUSTED_DOMAINS: localhost
    env:
      NEXTCLOUD_URL: http://localhost:8080/remote.php/dav/files/admin/
      NEXTCLOUD_USERNAME: admin
      NEXTCLOUD_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: python
        run: uv sync --all-extras --no-extra camel

      - name: Wait for Nextcloud install
        shell: bash
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/status.php | grep -q '"installed":true'; then
              echo "Nextcloud is installed"
              exit 0
            fi
            sleep 5
          done
          echo "Nextcloud did not finish installing in time" >&2
          curl -s http://localhost:8080/status.php || true
          exit 1

      - name: Run Nextcloud backend and check against truth
        shell: bash
        run: |
          set -o pipefail
          ./python/.venv/bin/python integ/nextcloud.py 2>&1 \
            | bash integ/check_lines.sh integ/truth_nextcloud.txt
